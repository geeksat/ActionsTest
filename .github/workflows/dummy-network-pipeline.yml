name: Dummy Network Pipeline

on:
  workflow_dispatch:
    inputs:
      location:
        description: Location
        required: true
        default: West Europe
        type: choice
        options:
          - West Europe
          - East US 2
          - West US 3
      environment:
        description: Environment
        required: true
        default: DEV
        type: string
      subscriptionName:
        description: Subscription Name
        required: true
        default: demo-subscription
        type: string

permissions:
  contents: read

jobs:
  read_from_ccs:
    name: Stage A - ReadFromCCS
    runs-on: ubuntu-latest
    outputs:
      lz_array_csv: ${{ steps.read_ccs.outputs.lz_array_csv }}
      vnet_name: ${{ steps.read_ccs.outputs.vnet_name }}
      region_code: ${{ steps.read_ccs.outputs.region_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dummy Stage A PowerShell
        id: read_ccs
        shell: pwsh
        run: |
          ./scripts/Read-FromCCS-Dummy.ps1 `
            -Location "${{ inputs.location }}" `
            -Environment "${{ inputs.environment }}" `
            -SubscriptionName "${{ inputs.subscriptionName }}"

      - name: Upload Stage A file
        uses: actions/upload-artifact@v4
        with:
          name: stage-a-output
          path: generated/stage-a-output.json

  build_parameter_file:
    name: Stage B - BuildParameterFile
    runs-on: ubuntu-latest
    needs: read_from_ccs
    outputs:
      parameter_file_path: ${{ steps.build_params.outputs.parameter_file_path }}
      subnet_values_json: ${{ steps.build_params.outputs.subnet_values_json }}
      vnet_name: ${{ steps.build_params.outputs.vnet_name }}
      location: ${{ steps.build_params.outputs.location }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Stage A file
        uses: actions/download-artifact@v4
        with:
          name: stage-a-output
          path: generated

      - name: Run dummy Stage B PowerShell
        id: build_params
        shell: pwsh
        run: |
          ./scripts/Build-ParameterFile-Dummy.ps1 `
            -Location "${{ inputs.location }}" `
            -Environment "${{ inputs.environment }}" `
            -SubscriptionName "${{ inputs.subscriptionName }}" `
            -FinalLZArrayCsv "${{ needs.read_from_ccs.outputs.lz_array_csv }}" `
            -VNetName "${{ needs.read_from_ccs.outputs.vnet_name }}" `
            -RegionCode "${{ needs.read_from_ccs.outputs.region_code }}" `
            -StageAFilePath "./generated/stage-a-output.json"

      - name: Show generated parameter file
        shell: pwsh
        run: |
          Get-Content "./generated/parameter-file.json"

  trigger_repo_b:
    name: Repo A - Trigger Repo B
    runs-on: ubuntu-latest
    needs: build_parameter_file
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: geeksat
          repositories: ReceiverRepo

      - name: Trigger Repo B workflow
        shell: pwsh
        run: |
          ./scripts/Trigger-ReceiverWorkflow.ps1 `
            -Token "${{ steps.app-token.outputs.token }}" `
            -TargetOwner "geeksat" `
            -TargetRepo "ReceiverRepo" `
            -WorkflowFile "receiver-print-subnets.yml" `
            -Ref "main" `
            -SourceRepo "${{ github.repository }}" `
            -SourceRunId "${{ github.run_id }}" `
            -Location "${{ needs.build_parameter_file.outputs.location }}" `
            -VNetName "${{ needs.build_parameter_file.outputs.vnet_name }}" `
            -SubnetsJson '${{ needs.build_parameter_file.outputs.subnet_values_json }}'
