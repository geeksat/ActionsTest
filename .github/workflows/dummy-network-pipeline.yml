name: Dummy Network Pipeline - API Dispatch
run-name: Sender | ${{ inputs.environment }} | ${{ inputs.location }}

on:
  workflow_dispatch:
    inputs:
      location:
        description: Location
        required: true
        default: West Europe
        type: choice
        options:
          - West Europe
          - East US 2
          - West US 3
      environment:
        description: Environment
        required: true
        default: DEV
        type: string
      subscriptionName:
        description: Subscription Name
        required: true
        default: demo-subscription
        type: string

permissions:
  contents: read

jobs:
  read_from_ccs:
    name: Stage A - ReadFromCCS
    runs-on: ubuntu-latest
    outputs:
      lz_array_csv: ${{ steps.read_ccs.outputs.lz_array_csv }}
      vnet_name: ${{ steps.read_ccs.outputs.vnet_name }}
      region_code: ${{ steps.read_ccs.outputs.region_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dummy Stage A PowerShell
        id: read_ccs
        shell: pwsh
        run: |
          ./scripts/Read-FromCCS-Dummy.ps1 `
            -Location "${{ inputs.location }}" `
            -Environment "${{ inputs.environment }}" `
            -SubscriptionName "${{ inputs.subscriptionName }}"

      - name: Upload Stage A file
        uses: actions/upload-artifact@v4
        with:
          name: stage-a-output
          path: generated/stage-a-output.json

  build_parameter_file:
    name: Stage B - BuildParameterFile
    runs-on: ubuntu-latest
    needs: read_from_ccs
    outputs:
      parameter_file_path: ${{ steps.build_params.outputs.parameter_file_path }}
      subnet_values_json: ${{ steps.build_params.outputs.subnet_values_json }}
      vnet_name: ${{ steps.build_params.outputs.vnet_name }}
      location: ${{ steps.build_params.outputs.location }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Stage A file
        uses: actions/download-artifact@v4
        with:
          name: stage-a-output
          path: generated

      - name: Run dummy Stage B PowerShell
        id: build_params
        shell: pwsh
        run: |
          ./scripts/Build-ParameterFile-Dummy.ps1 `
            -Location "${{ inputs.location }}" `
            -Environment "${{ inputs.environment }}" `
            -SubscriptionName "${{ inputs.subscriptionName }}" `
            -FinalLZArrayCsv "${{ needs.read_from_ccs.outputs.lz_array_csv }}" `
            -VNetName "${{ needs.read_from_ccs.outputs.vnet_name }}" `
            -RegionCode "${{ needs.read_from_ccs.outputs.region_code }}" `
            -StageAFilePath "./generated/stage-a-output.json"

      - name: Show generated parameter file
        shell: pwsh
        run: |
          Get-Content "./generated/parameter-file.json"

  trigger_repo_b:
    name: Trigger Repo B workflow_dispatch
    runs-on: ubuntu-latest
    needs: build_parameter_file

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: geeksat
          repositories: |
            ReceiverRepo

      - name: Dispatch Repo B workflow
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_OWNER: geeksat
          TARGET_REPO: ReceiverRepo
          TARGET_WORKFLOW: receiver-print-subnets.yml
          TARGET_REF: main
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          LOCATION: ${{ needs.build_parameter_file.outputs.location }}
          VNET_NAME: ${{ needs.build_parameter_file.outputs.vnet_name }}
          SUBNETS_JSON: ${{ needs.build_parameter_file.outputs.subnet_values_json }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $body = @{
            ref = $env:TARGET_REF
            inputs = @{
              source_repo   = $env:SOURCE_REPO
              source_run_id = $env:SOURCE_RUN_ID
              location      = $env:LOCATION
              vnet_name     = $env:VNET_NAME
              subnets_json  = $env:SUBNETS_JSON
            }
          } | ConvertTo-Json -Depth 20 -Compress

          Write-Host "Dispatch body:"
          Write-Host $body

          Invoke-RestMethod `
            -Method POST `
            -Uri "https://api.github.com/repos/$env:TARGET_OWNER/$env:TARGET_REPO/actions/workflows/$env:TARGET_WORKFLOW/dispatches" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"

          Write-Host "Repo B workflow_dispatch sent successfully."

      - name: Verify Repo B run exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_OWNER: geeksat
          TARGET_REPO: ReceiverRepo
          TARGET_WORKFLOW: receiver-print-subnets.yml
        run: |
          Start-Sleep -Seconds 8

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $response = Invoke-RestMethod `
            -Method GET `
            -Uri "https://api.github.com/repos/$env:TARGET_OWNER/$env:TARGET_REPO/actions/workflows/$env:TARGET_WORKFLOW/runs?per_page=5" `
            -Headers $headers

          $latest = $response.workflow_runs | Select-Object -First 1

          if (-not $latest) {
            throw "No workflow runs found in Repo B."
          }

          Write-Host "Latest Repo B run URL: $($latest.html_url)"
          Write-Host "Latest Repo B run status: $($latest.status)"
          Write-Host "Latest Repo B run conclusion: $($latest.conclusion)"
