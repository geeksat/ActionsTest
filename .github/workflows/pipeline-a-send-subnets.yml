name: Pipeline A - Build and Send Subnets

on:
  workflow_dispatch:
    inputs:
      location:
        description: Location
        required: true
        default: West Europe
        type: choice
        options:
          - West Europe
          - East US 2
          - West US 3
      environment:
        description: Environment
        required: true
        default: DEV
        type: string
      subscriptionName:
        description: Subscription Name
        required: true
        default: demo-subscription
        type: string

permissions:
  contents: read

jobs:
  stage_a_read_from_ccs:
    name: Pipeline A - Stage A - ReadFromCCS
    runs-on: ubuntu-latest

    outputs:
      lz_array_csv: ${{ steps.read_ccs.outputs.lz_array_csv }}
      vnet_name: ${{ steps.read_ccs.outputs.vnet_name }}
      region_code: ${{ steps.read_ccs.outputs.region_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Stage A script
        id: read_ccs
        shell: pwsh
        run: |
          ./scripts/Read-FromCCS-Dummy.ps1 `
            -Location "${{ inputs.location }}" `
            -Environment "${{ inputs.environment }}" `
            -SubscriptionName "${{ inputs.subscriptionName }}"

      - name: Upload Stage A file
        uses: actions/upload-artifact@v4
        with:
          name: stage-a-output
          path: generated/stage-a-output.json

  stage_b_build_parameter_file:
    name: Pipeline A - Stage B - BuildParameterFile
    runs-on: ubuntu-latest
    needs: stage_a_read_from_ccs

    outputs:
      subnet_values_json: ${{ steps.build_params.outputs.subnet_values_json }}
      vnet_name: ${{ steps.build_params.outputs.vnet_name }}
      location: ${{ steps.build_params.outputs.location }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Stage A file
        uses: actions/download-artifact@v4
        with:
          name: stage-a-output
          path: generated

      - name: Run Stage B script
        id: build_params
        shell: pwsh
        run: |
          ./scripts/Build-ParameterFile-Dummy.ps1 `
            -Location "${{ inputs.location }}" `
            -Environment "${{ inputs.environment }}" `
            -SubscriptionName "${{ inputs.subscriptionName }}" `
            -FinalLZArrayCsv "${{ needs.stage_a_read_from_ccs.outputs.lz_array_csv }}" `
            -VNetName "${{ needs.stage_a_read_from_ccs.outputs.vnet_name }}" `
            -RegionCode "${{ needs.stage_a_read_from_ccs.outputs.region_code }}" `
            -StageAFilePath "./generated/stage-a-output.json"

      - name: Debug Stage B outputs
        shell: pwsh
        env:
          SUBNET_VALUES_JSON: ${{ steps.build_params.outputs.subnet_values_json }}
        run: |
          Write-Host "Location: ${{ steps.build_params.outputs.location }}"
          Write-Host "VNet Name: ${{ steps.build_params.outputs.vnet_name }}"
          Write-Host "Subnets JSON: $env:SUBNET_VALUES_JSON"

  call_pipeline_b:
    name: Pipeline A - Call Pipeline B
    needs: stage_b_build_parameter_file
    uses: geeksat/ReceiverRepo/.github/workflows/pipeline-b-receive-subnets.yml@main
    with:
      source_repo: ${{ github.repository }}
      source_run_id: ${{ github.run_id }}
      location: ${{ needs.stage_b_build_parameter_file.outputs.location }}
      vnet_name: ${{ needs.stage_b_build_parameter_file.outputs.vnet_name }}
      subnet_values_json: ${{ needs.stage_b_build_parameter_file.outputs.subnet_values_json }}
